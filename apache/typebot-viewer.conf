<VirtualHost *:80>
    ServerName bot.SEUDOMINIO.com.br

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3002/
    ProxyPassReverse / http://127.0.0.1:3002/

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3002/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/typebot-viewer_error.log
    CustomLog ${APACHE_LOG_DIR}/typebot-viewer_access.log combined
</VirtualHost>
