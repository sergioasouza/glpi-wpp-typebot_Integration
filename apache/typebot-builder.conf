<VirtualHost *:80>
    ServerName typebot.SEUDOMINIO.com.br

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3001/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/typebot-builder_error.log
    CustomLog ${APACHE_LOG_DIR}/typebot-builder_access.log combined
</VirtualHost>
