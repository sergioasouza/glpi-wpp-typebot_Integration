<VirtualHost *:80>
    ServerName evolution.SEUDOMINIO.com.br

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # WebSocket support (necessário para Evolution API)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:8080/$1 [P,L]

    # Auth básica para proteger painel Evolution (opcional mas recomendado)
    # Gerar: htpasswd -c /etc/apache2/.htpasswd_evolution admin
    # <Location />
    #     AuthType Basic
    #     AuthName "Evolution API"
    #     AuthUserFile /etc/apache2/.htpasswd_evolution
    #     Require valid-user
    # </Location>

    ErrorLog ${APACHE_LOG_DIR}/evolution-api_error.log
    CustomLog ${APACHE_LOG_DIR}/evolution-api_access.log combined
</VirtualHost>
