# ─────────────────────────────────────────────────
#  Typebot Viewer — Reverse Proxy
#  Arquivo: /etc/nginx/sites-available/typebot-viewer.conf
# ─────────────────────────────────────────────────

server {
    listen 80;
    server_name bot.SEUDOMINIO.com.br;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bot.SEUDOMINIO.com.br;

    ssl_certificate /etc/letsencrypt/live/bot.SEUDOMINIO.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.SEUDOMINIO.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
