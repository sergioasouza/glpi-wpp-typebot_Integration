# ─────────────────────────────────────────────────
#  Evolution API — Reverse Proxy
#  Arquivo: /etc/nginx/sites-available/evolution.conf
# ─────────────────────────────────────────────────

server {
    listen 80;
    server_name evolution.SEUDOMINIO.com.br;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name evolution.SEUDOMINIO.com.br;

    # SSL — será preenchido pelo certbot
    ssl_certificate /etc/letsencrypt/live/evolution.SEUDOMINIO.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evolution.SEUDOMINIO.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proteger painel da Evolution com auth básica
    auth_basic "Acesso Restrito";
    auth_basic_user_file /etc/nginx/.htpasswd_evolution;

    # Liberar webhook sem auth (Evolution API precisa receber callbacks)
    location /webhook {
        auth_basic off;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }
}
