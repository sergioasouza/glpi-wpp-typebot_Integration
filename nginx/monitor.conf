# ─────────────────────────────────────────────────
#  Uptime Kuma — Monitoramento (opcional)
#  Arquivo: /etc/nginx/sites-available/monitor.conf
# ─────────────────────────────────────────────────

server {
    listen 80;
    server_name monitor.SEUDOMINIO.com.br;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name monitor.SEUDOMINIO.com.br;

    ssl_certificate /etc/letsencrypt/live/monitor.SEUDOMINIO.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.SEUDOMINIO.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
