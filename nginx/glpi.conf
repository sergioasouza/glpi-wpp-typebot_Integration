# ─────────────────────────────────────────────────
#  GLPI — Proxy para Apache local na porta 8888
#  Arquivo: /etc/nginx/sites-available/glpi.conf
#  Este bloco faz o Nginx repassar tudo para o Apache
#  que continua servindo o GLPI normalmente.
# ─────────────────────────────────────────────────

server {
    listen 80;
    server_name glpi.SEUDOMINIO.com.br;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
